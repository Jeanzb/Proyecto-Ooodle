services:
  - type: web
    name: ooodle-game
    runtime: node
    plan: free
    buildCommand: npm --prefix backend ci && npm --prefix backend run build
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
